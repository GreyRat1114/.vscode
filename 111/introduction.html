<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            min-height: 100vh;
            position: relative; /* 父级定位 */            
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 你的背景图片路径 */
            background-image: url("image1.png");
            background-size: cover;
            /* 背景透明度：0~1之间，数字越小越透明 */
            opacity: 0.7; 
            z-index: -1; /* 放在最底层，不遮挡内容 */
        }
    </style>
</head>
<body background="./image.png">

    <h1 align="center" style="color: rgb(255, 255, 255); margin-left: 20px">个人介绍</h1>
    <h2></h2>
    <button align="center" onclick="kebiao()"> 点击查看课表</button>
    <script>
        function kebiao(){
            
            window.open("kebiao.html")
        }
    </script>

</body>
</html>
